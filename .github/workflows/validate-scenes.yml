name: Validate scenes

on:
  pull_request:
    paths:
      - "scripts/*.json"
      - "sprites/manifest.json"
      - "tools/validate_scenes.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run scene validator
        run: python3 tools/validate_scenes.py
